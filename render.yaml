services:
  - type: web
    name: core-site
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: STREAM_ENABLE_LOCAL_WORKER_RUN
        value: "0"
      - key: CORE_ADMIN_KEY
        sync: false
